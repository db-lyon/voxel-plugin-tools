actionPrefix: voxel
minServerVersion: 1.0.15
uePluginDependency: Voxel

# Tools here are STRICTLY ATOMIC — each wraps exactly one host ue-mcp call.
# Orchestrations live under `flows:` below, not inside task bodies.
# Every action cites the Voxel Plugin C++ header it wraps.

inject:
  level:
    # ── Spawns (wrap level.place_actor) ──────────────────────────────────
    spawn_world:
      task: voxel.spawn_world
      description: "Atomic. Drop an AVoxelWorld into the active level. Wraps level.place_actor with actorClass=/Script/Voxel.VoxelWorld. Property setup (LayerStack, MegaMaterial, VoxelSize) is a separate call — see voxel_set_world_* — or use the voxel_hello_world flow which chains the canonical defaults. Header: Voxel/Public/VoxelWorld.h. Params: label?, location? ({x,y,z}), rotation? ({x,y,z}), scale? ({x,y,z})."
      schema:
        label:    { type: string }
        location: { type: object }
        rotation: { type: object }
        scale:    { type: object }

    spawn_stamp_actor:
      task: voxel.spawn_stamp_actor
      description: "Atomic. Drop an AVoxelStampActor (a placement actor owning one stamp). Wraps level.place_actor with actorClass=/Script/Voxel.VoxelStampActor. Header: Voxel/Public/VoxelStampActor.h. Params: label?, location?, rotation?, scale?."
      schema:
        label:    { type: string }
        location: { type: object }
        rotation: { type: object }
        scale:    { type: object }

    spawn_height_sculpt_actor:
      task: voxel.spawn_height_sculpt_actor
      description: "Atomic. Drop an AVoxelHeightSculptActor — the target for 2D/height sculpting. Wraps level.place_actor with actorClass=/Script/Voxel.VoxelHeightSculptActor. Header: Voxel/Public/Sculpt/Height/VoxelHeightSculptActor.h. Params: label?, location?, rotation?, scale?."
      schema:
        label:    { type: string }
        location: { type: object }
        rotation: { type: object }
        scale:    { type: object }

    spawn_volume_sculpt_actor:
      task: voxel.spawn_volume_sculpt_actor
      description: "Atomic. Drop an AVoxelVolumeSculptActor — the target for 3D/volume sculpting. Wraps level.place_actor with actorClass=/Script/Voxel.VoxelVolumeSculptActor. Header: Voxel/Public/Sculpt/Volume/VoxelVolumeSculptActor.h. Params: label?, location?, rotation?, scale?."
      schema:
        label:    { type: string }
        location: { type: object }
        rotation: { type: object }
        scale:    { type: object }

    spawn_collision_baker:
      task: voxel.spawn_collision_baker
      description: "Atomic. Drop an AVoxelCollisionBaker — bakes collision for a voxel layer within a radius. Wraps level.place_actor with actorClass=/Script/Voxel.VoxelCollisionBaker. Header: Voxel/Public/Collision/VoxelCollisionBaker.h. Params: label?, location?, rotation?, scale?."
      schema:
        label:    { type: string }
        location: { type: object }
        rotation: { type: object }
        scale:    { type: object }

    spawn_debug_actor:
      task: voxel.spawn_debug_actor
      description: "Atomic. Drop an AVoxelDebugActor — visualizes a voxel layer over a debug region (dev tool). Wraps level.place_actor with actorClass=/Script/Voxel.VoxelDebugActor. Header: Voxel/Public/VoxelDebugActor.h. Params: label?, location?, rotation?, scale?."
      schema:
        label:    { type: string }
        location: { type: object }
        rotation: { type: object }
        scale:    { type: object }

    # ── World lifecycle / status (wrap editor.invoke_function) ────────────
    is_world_ready:
      task: voxel.is_world_ready
      description: "Atomic. Read AVoxelWorld::IsVoxelWorldReady() — the single most useful gate before scattering / stamping / sampling. Wraps editor.invoke_function. Result at data.returnValues.ReturnValue as 'true'/'false'. Header: Voxel/Public/VoxelWorld.h. Params: actorLabel, world? (editor|pie)."
      schema:
        actorLabel: { type: string, required: true }
        world:      { type: string }

    get_world_progress:
      task: voxel.get_world_progress
      description: "Atomic. Read AVoxelWorld::GetProgress() — 0..1 while processing, 1 when idle. Wraps editor.invoke_function. Result at data.returnValues.ReturnValue (float string). Header: Voxel/Public/VoxelWorld.h. Params: actorLabel, world? (editor|pie)."
      schema:
        actorLabel: { type: string, required: true }
        world:      { type: string }

    is_runtime_created:
      task: voxel.is_runtime_created
      description: "Atomic. Read AVoxelWorld::IsRuntimeCreated() — runtime initialized (distinct from fully-rendered; see voxel_is_world_ready). Wraps editor.invoke_function. Result 'true'/'false' at data.returnValues.ReturnValue. Header: Voxel/Public/VoxelWorld.h. Params: actorLabel, world? (editor|pie)."
      schema:
        actorLabel: { type: string, required: true }
        world:      { type: string }

    is_processing_new_state:
      task: voxel.is_processing_new_state
      description: "Atomic. Read AVoxelWorld::IsProcessingNewState() — a regeneration is in flight. Wraps editor.invoke_function. Result 'true'/'false' at data.returnValues.ReturnValue. Header: Voxel/Public/VoxelWorld.h. Params: actorLabel, world? (editor|pie)."
      schema:
        actorLabel: { type: string, required: true }
        world:      { type: string }

    get_num_pending_tasks:
      task: voxel.get_num_pending_tasks
      description: "Atomic. Read AVoxelWorld::GetNumPendingTasks() — queued background task count; coarse 'work left' signal. Wraps editor.invoke_function. Result at data.returnValues.ReturnValue (int string). Header: Voxel/Public/VoxelWorld.h. Params: actorLabel, world? (editor|pie)."
      schema:
        actorLabel: { type: string, required: true }
        world:      { type: string }

    create_runtime:
      task: voxel.create_runtime
      description: "Atomic. Call AVoxelWorld::CreateRuntime() — explicitly initialize the voxel runtime (e.g. when bCreateRuntimeOnBeginPlay is off). No return value. Wraps editor.invoke_function. Header: Voxel/Public/VoxelWorld.h. Params: actorLabel, world? (editor|pie)."
      schema:
        actorLabel: { type: string, required: true }
        world:      { type: string }

    destroy_runtime:
      task: voxel.destroy_runtime
      description: "Atomic. Call AVoxelWorld::DestroyRuntime() — tear down the voxel runtime (frees meshes/collision/nav until re-created). No return value. Wraps editor.invoke_function. Header: Voxel/Public/VoxelWorld.h. Params: actorLabel, world? (editor|pie)."
      schema:
        actorLabel: { type: string, required: true }
        world:      { type: string }

    # ── AVoxelWorld config (wrap level.set_actor_property) ────────────────
    set_world_layer_stack:
      task: voxel.set_world_layer_stack
      description: "Atomic. Set AVoxelWorld::LayerStack — the UVoxelLayerStack asset defining what the world generates/renders (without it the world renders nothing). Wraps level.set_actor_property. Header: Voxel/Public/VoxelWorld.h. Params: actorLabel, value (asset object path, e.g. /Voxel/Default/DefaultStack.DefaultStack)."
      schema:
        actorLabel: { type: string, required: true }
        value:      { type: string, required: true }

    set_world_mega_material:
      task: voxel.set_world_mega_material
      description: "Atomic. Set AVoxelWorld::MegaMaterial — the UVoxelMegaMaterial asset driving surface shading. Wraps level.set_actor_property. Header: Voxel/Public/VoxelWorld.h. Params: actorLabel, value (asset object path)."
      schema:
        actorLabel: { type: string, required: true }
        value:      { type: string, required: true }

    set_world_voxel_size:
      task: voxel.set_world_voxel_size
      description: "Atomic. Set AVoxelWorld::VoxelSize — edge length of one voxel in cm (default 100; lower = finer + heavier). Wraps level.set_actor_property. Header: Voxel/Public/VoxelWorld.h. Params: actorLabel, value (integer cm)."
      schema:
        actorLabel: { type: string, required: true }
        value:      { type: number, required: true }

    # ── Volume sculpting (static VoxelVolumeSculptBlueprintLibrary; ──────────
    #    wrap editor.execute_python — no native static-library invoke exists).
    #    All target an AVoxelVolumeSculptActor by label; center is world-space.
    volume_sculpt_sphere:
      task: voxel.volume_sculpt_sphere
      description: "Atomic. Add/remove a sphere on an AVoxelVolumeSculptActor. Wraps editor.execute_python -> VoxelVolumeSculptBlueprintLibrary::SculptSphere. Header: Voxel/Public/Sculpt/Volume/VoxelVolumeSculptBlueprintLibrary.h. Params: actorLabel, center ({x,y,z}), radius? (cm, def 1000), mode? (add|remove), smoothness? (def 0)."
      schema:
        actorLabel: { type: string, required: true }
        center:     { type: object, required: true }
        radius:     { type: number }
        mode:       { type: string }
        smoothness: { type: number }

    volume_sculpt_cube:
      task: voxel.volume_sculpt_cube
      description: "Atomic. Add/remove a rounded, rotated cube on an AVoxelVolumeSculptActor. Wraps editor.execute_python -> VoxelVolumeSculptBlueprintLibrary::SculptCube. Params: actorLabel, center ({x,y,z}), size? ({x,y,z}, def 1000^3), rotation? ({pitch,yaw,roll}), roundness? (def 0), mode? (add|remove), smoothness? (def 0)."
      schema:
        actorLabel: { type: string, required: true }
        center:     { type: object, required: true }
        size:       { type: object }
        rotation:   { type: object }
        roundness:  { type: number }
        mode:       { type: string }
        smoothness: { type: number }

    volume_flatten:
      task: voxel.volume_flatten
      description: "Atomic. Flatten a voxel surface along a normal on an AVoxelVolumeSculptActor. Wraps editor.execute_python -> VoxelVolumeSculptBlueprintLibrary::Flatten. Params: actorLabel, center ({x,y,z}), normal? ({x,y,z}, def (0,0,1)), radius? (def 500), height? (def 1000), falloff? (0..1, def 0.1), type? (additive|subtractive|both)."
      schema:
        actorLabel: { type: string, required: true }
        center:     { type: object, required: true }
        normal:     { type: object }
        radius:     { type: number }
        height:     { type: number }
        falloff:    { type: number }
        type:       { type: string }

    volume_smooth:
      task: voxel.volume_smooth
      description: "Atomic. Smooth/blur a region on an AVoxelVolumeSculptActor. Wraps editor.execute_python -> VoxelVolumeSculptBlueprintLibrary::Smooth. Params: actorLabel, center ({x,y,z}), radius? (def 1000), strength? (def 1)."
      schema:
        actorLabel: { type: string, required: true }
        center:     { type: object, required: true }
        radius:     { type: number }
        strength:   { type: number }

    volume_sculpt_surface:
      task: voxel.volume_sculpt_surface
      description: "Atomic. Progressively sculpt a voxel surface on an AVoxelVolumeSculptActor. Wraps editor.execute_python -> VoxelVolumeSculptBlueprintLibrary::SculptSurface. Params: actorLabel, center ({x,y,z}), radius? (def 500), strength? (def 0.5), mode? (add|remove)."
      schema:
        actorLabel: { type: string, required: true }
        center:     { type: object, required: true }
        radius:     { type: number }
        strength:   { type: number }
        mode:       { type: string }

    volume_sculpt_angle:
      task: voxel.volume_sculpt_angle
      description: "Atomic. Move a voxel surface toward a plane (sculpt angles) on an AVoxelVolumeSculptActor. Wraps editor.execute_python -> VoxelVolumeSculptBlueprintLibrary::SculptAngle. Params: actorLabel, center ({x,y,z}), radius? (def 500), strength? (def 1), planePoint? ({x,y,z}), planeNormal? ({x,y,z}, def (0,0,1)), mergeMode? (intersection|override|union)."
      schema:
        actorLabel:  { type: string, required: true }
        center:      { type: object, required: true }
        radius:      { type: number }
        strength:    { type: number }
        planePoint:  { type: object }
        planeNormal: { type: object }
        mergeMode:   { type: string }

    volume_paint_surface:
      task: voxel.volume_paint_surface
      description: "Atomic. Paint a surface type on a sculpt stamp of an AVoxelVolumeSculptActor. Wraps editor.execute_python -> VoxelVolumeSculptBlueprintLibrary::PaintSurface. Params: actorLabel, center ({x,y,z}), radius? (def 500), strength? (def 0.05), mode? (add|remove), surfaceType? (object path to a UVoxelSurfaceTypeInterface asset)."
      schema:
        actorLabel:  { type: string, required: true }
        center:      { type: object, required: true }
        radius:      { type: number }
        strength:    { type: number }
        mode:        { type: string }
        surfaceType: { type: string }

    volume_clear_sculpt_data:
      task: voxel.volume_clear_sculpt_data
      description: "Atomic. Clear all sculpt data on an AVoxelVolumeSculptActor (resets edits). Wraps editor.execute_python -> VoxelVolumeSculptBlueprintLibrary::ClearSculptData. Params: actorLabel."
      schema:
        actorLabel: { type: string, required: true }

    # ── Height sculpting (static VoxelHeightSculptBlueprintLibrary; ─────────
    #    wrap editor.execute_python). Target an AVoxelHeightSculptActor by
    #    label; center is 2D ({x,y}) world-space.
    height_sculpt_height:
      task: voxel.height_sculpt_height
      description: "Atomic. Raise/lower height on an AVoxelHeightSculptActor. Wraps editor.execute_python -> VoxelHeightSculptBlueprintLibrary::SculptHeight. Header: Voxel/Public/Sculpt/Height/VoxelHeightSculptBlueprintLibrary.h. Params: actorLabel, center ({x,y}), radius? (def 500), strength? (def 0.5), mode? (add|remove)."
      schema:
        actorLabel: { type: string, required: true }
        center:     { type: object, required: true }
        radius:     { type: number }
        strength:   { type: number }
        mode:       { type: string }

    height_flatten:
      task: voxel.height_flatten
      description: "Atomic. Flatten a height region toward a target height on an AVoxelHeightSculptActor. Wraps editor.execute_python -> VoxelHeightSculptBlueprintLibrary::Flatten. Params: actorLabel, center ({x,y}), radius? (def 500), falloff? (0..1, def 0.1), type? (additive|subtractive|both), targetHeight? (def 0)."
      schema:
        actorLabel:   { type: string, required: true }
        center:       { type: object, required: true }
        radius:       { type: number }
        falloff:      { type: number }
        type:         { type: string }
        targetHeight: { type: number }

    height_smooth:
      task: voxel.height_smooth
      description: "Atomic. Smooth/blur a height region on an AVoxelHeightSculptActor. Wraps editor.execute_python -> VoxelHeightSculptBlueprintLibrary::Smooth. Params: actorLabel, center ({x,y}), radius? (def 1000), strength? (def 1)."
      schema:
        actorLabel: { type: string, required: true }
        center:     { type: object, required: true }
        radius:     { type: number }
        strength:   { type: number }

    height_paint_surface:
      task: voxel.height_paint_surface
      description: "Atomic. Paint a surface type on a height sculpt stamp of an AVoxelHeightSculptActor. Wraps editor.execute_python -> VoxelHeightSculptBlueprintLibrary::PaintSurface. Params: actorLabel, center ({x,y}), radius? (def 500), strength? (def 0.05), mode? (add|remove), surfaceType? (object path to a UVoxelSurfaceTypeInterface asset)."
      schema:
        actorLabel:  { type: string, required: true }
        center:      { type: object, required: true }
        radius:      { type: number }
        strength:    { type: number }
        mode:        { type: string }
        surfaceType: { type: string }

    height_clear_sculpt_data:
      task: voxel.height_clear_sculpt_data
      description: "Atomic. Clear all sculpt data on an AVoxelHeightSculptActor (resets edits). Wraps editor.execute_python -> VoxelHeightSculptBlueprintLibrary::ClearSculptData. Params: actorLabel."
      schema:
        actorLabel: { type: string, required: true }

knowledge: {}

tasks:
  voxel.spawn_world:
    class_path: tasks/SpawnWorld
    description: "Spawn an AVoxelWorld actor (atomic)"
  voxel.spawn_stamp_actor:
    class_path: tasks/SpawnStampActor
    description: "Spawn an AVoxelStampActor (atomic)"
  voxel.spawn_height_sculpt_actor:
    class_path: tasks/SpawnHeightSculptActor
    description: "Spawn an AVoxelHeightSculptActor (atomic)"
  voxel.spawn_volume_sculpt_actor:
    class_path: tasks/SpawnVolumeSculptActor
    description: "Spawn an AVoxelVolumeSculptActor (atomic)"
  voxel.spawn_collision_baker:
    class_path: tasks/SpawnCollisionBaker
    description: "Spawn an AVoxelCollisionBaker (atomic)"
  voxel.spawn_debug_actor:
    class_path: tasks/SpawnDebugActor
    description: "Spawn an AVoxelDebugActor (atomic)"
  voxel.is_world_ready:
    class_path: tasks/IsWorldReady
    description: "Read IsVoxelWorldReady on an AVoxelWorld actor (atomic)"
  voxel.get_world_progress:
    class_path: tasks/GetWorldProgress
    description: "Read GetProgress on an AVoxelWorld actor (atomic)"
  voxel.is_runtime_created:
    class_path: tasks/IsRuntimeCreated
    description: "Read IsRuntimeCreated on an AVoxelWorld actor (atomic)"
  voxel.is_processing_new_state:
    class_path: tasks/IsProcessingNewState
    description: "Read IsProcessingNewState on an AVoxelWorld actor (atomic)"
  voxel.get_num_pending_tasks:
    class_path: tasks/GetNumPendingTasks
    description: "Read GetNumPendingTasks on an AVoxelWorld actor (atomic)"
  voxel.create_runtime:
    class_path: tasks/CreateRuntime
    description: "Call CreateRuntime on an AVoxelWorld actor (atomic)"
  voxel.destroy_runtime:
    class_path: tasks/DestroyRuntime
    description: "Call DestroyRuntime on an AVoxelWorld actor (atomic)"
  voxel.set_world_layer_stack:
    class_path: tasks/SetLayerStack
    description: "Set AVoxelWorld::LayerStack (atomic)"
  voxel.set_world_mega_material:
    class_path: tasks/SetMegaMaterial
    description: "Set AVoxelWorld::MegaMaterial (atomic)"
  voxel.set_world_voxel_size:
    class_path: tasks/SetVoxelSize
    description: "Set AVoxelWorld::VoxelSize (atomic)"
  voxel.volume_sculpt_sphere:
    class_path: tasks/VolumeSculptSphere
    description: "Volume sculpt: add/remove a sphere (atomic)"
  voxel.volume_sculpt_cube:
    class_path: tasks/VolumeSculptCube
    description: "Volume sculpt: add/remove a cube (atomic)"
  voxel.volume_flatten:
    class_path: tasks/VolumeFlatten
    description: "Volume sculpt: flatten along a normal (atomic)"
  voxel.volume_smooth:
    class_path: tasks/VolumeSmooth
    description: "Volume sculpt: smooth a region (atomic)"
  voxel.volume_sculpt_surface:
    class_path: tasks/VolumeSculptSurface
    description: "Volume sculpt: progressively sculpt a surface (atomic)"
  voxel.volume_sculpt_angle:
    class_path: tasks/VolumeSculptAngle
    description: "Volume sculpt: angle a surface toward a plane (atomic)"
  voxel.volume_paint_surface:
    class_path: tasks/VolumePaintSurface
    description: "Volume sculpt: paint a surface type (atomic)"
  voxel.volume_clear_sculpt_data:
    class_path: tasks/VolumeClearSculptData
    description: "Volume sculpt: clear all sculpt data (atomic)"
  voxel.height_sculpt_height:
    class_path: tasks/HeightSculptHeight
    description: "Height sculpt: raise/lower height (atomic)"
  voxel.height_flatten:
    class_path: tasks/HeightFlatten
    description: "Height sculpt: flatten toward a target height (atomic)"
  voxel.height_smooth:
    class_path: tasks/HeightSmooth
    description: "Height sculpt: smooth a region (atomic)"
  voxel.height_paint_surface:
    class_path: tasks/HeightPaintSurface
    description: "Height sculpt: paint a surface type (atomic)"
  voxel.height_clear_sculpt_data:
    class_path: tasks/HeightClearSculptData
    description: "Height sculpt: clear all sculpt data (atomic)"

flows:
  voxel_hello_world:
    description: "0-to-1: spawn an AVoxelWorld and assign the bundled default LayerStack so it renders. Pass `label` (and optional location/rotation/scale) as flow params. The LayerStack assignment threads the spawned actor's label via ${steps.1.data.actorLabel}."
    steps:
      1:
        task: voxel.spawn_world
        # `label`, `location`, `rotation`, `scale` come in via FlowRunOptions.params
        # and merge into this step's options at runtime.
      2:
        task: level.set_actor_property
        options:
          actorLabel: "${steps.1.data.actorLabel}"
          propertyName: LayerStack
          value: /Voxel/Default/DefaultStack.DefaultStack
