actionPrefix: voxel
minServerVersion: 1.0.15
uePluginDependency: Voxel

# Tools here are STRICTLY ATOMIC — each wraps exactly one host ue-mcp call.
# Orchestrations live under `flows:` below, not inside task bodies.
# Every action cites the Voxel Plugin C++ header it wraps.

inject:
  level:
    # ── Spawns (wrap level.place_actor) ──────────────────────────────────
    spawn_world:
      task: voxel.spawn_world
      description: "Drop an AVoxelWorld into the active level. Wraps level.place_actor with actorClass=/Script/Voxel.VoxelWorld. Property setup (LayerStack, MegaMaterial, VoxelSize) is a separate call — see voxel_set_world_* — or use the voxel_hello_world flow which chains the canonical defaults. Header: Voxel/Public/VoxelWorld.h. Params: label?, location? ({x,y,z}), rotation? ({x,y,z}), scale? ({x,y,z})."
      schema:
        label: { type: string }
        location: { type: object }
        rotation: { type: object }
        scale: { type: object }

    spawn_stamp_actor:
      task: voxel.spawn_stamp_actor
      description: "Drop an AVoxelStampActor (a placement actor owning one stamp). Wraps level.place_actor with actorClass=/Script/Voxel.VoxelStampActor. Header: Voxel/Public/VoxelStampActor.h. Params: label?, location?, rotation?, scale?."
      schema:
        label: { type: string }
        location: { type: object }
        rotation: { type: object }
        scale: { type: object }

    spawn_height_sculpt_actor:
      task: voxel.spawn_height_sculpt_actor
      description: "Drop an AVoxelHeightSculptActor — the target for 2D/height sculpting. Wraps level.place_actor with actorClass=/Script/Voxel.VoxelHeightSculptActor. Header: Voxel/Public/Sculpt/Height/VoxelHeightSculptActor.h. Params: label?, location?, rotation?, scale?."
      schema:
        label: { type: string }
        location: { type: object }
        rotation: { type: object }
        scale: { type: object }

    spawn_volume_sculpt_actor:
      task: voxel.spawn_volume_sculpt_actor
      description: "Drop an AVoxelVolumeSculptActor — the target for 3D/volume sculpting. Wraps level.place_actor with actorClass=/Script/Voxel.VoxelVolumeSculptActor. Header: Voxel/Public/Sculpt/Volume/VoxelVolumeSculptActor.h. Params: label?, location?, rotation?, scale?."
      schema:
        label: { type: string }
        location: { type: object }
        rotation: { type: object }
        scale: { type: object }

    spawn_collision_baker:
      task: voxel.spawn_collision_baker
      description: "Drop an AVoxelCollisionBaker — bakes collision for a voxel layer within a radius. Wraps level.place_actor with actorClass=/Script/Voxel.VoxelCollisionBaker. Header: Voxel/Public/Collision/VoxelCollisionBaker.h. Params: label?, location?, rotation?, scale?."
      schema:
        label: { type: string }
        location: { type: object }
        rotation: { type: object }
        scale: { type: object }

    spawn_debug_actor:
      task: voxel.spawn_debug_actor
      description: "Drop an AVoxelDebugActor — visualizes a voxel layer over a debug region (dev tool). Wraps level.place_actor with actorClass=/Script/Voxel.VoxelDebugActor. Header: Voxel/Public/VoxelDebugActor.h. Params: label?, location?, rotation?, scale?."
      schema:
        label: { type: string }
        location: { type: object }
        rotation: { type: object }
        scale: { type: object }

    # ── Stamp / sculpt instance methods + components ──────────────────────
    add_stamp_component:
      task: voxel.add_stamp_component
      description: "Attach a UVoxelStampComponent to an existing actor (carry a voxel stamp). Wraps level.add_component with componentClass=/Script/Voxel.VoxelStampComponent. Header: Voxel/Public/VoxelStampComponent.h. Params: actorLabel, componentName?."
      schema:
        actorLabel: { type: string, required: true }
        componentName: { type: string }

    set_heightmap_stamp:
      task: voxel.set_heightmap_stamp
      description: "Build a heightmap stamp from a UVoxelHeightmap (source) and apply it to a stamp actor (Make -> SetStamp -> UpdateStamp). Wraps editor.execute_python. Header: Voxel/Public/Height/VoxelHeightmapStamp.h. Params: actorLabel (an AVoxelStampActor), source (UVoxelHeightmap object path), location?, rotation?, scale?, blendMode? (max|min|override, default max), priority?, smoothness?."
      schema:
        actorLabel: { type: string, required: true }
        source:     { type: string, required: true }
        location:   { type: object }
        rotation:   { type: object }
        scale:      { type: object }
        blendMode:  { type: string }
        priority:   { type: number }
        smoothness: { type: number }

    set_height_graph_stamp:
      task: voxel.set_height_graph_stamp
      description: "Build a height-graph stamp from a UVoxelHeightGraph (source) and apply it to a stamp actor. Wraps editor.execute_python -> VoxelHeightGraphStamp.Make. Params: actorLabel, source (UVoxelHeightGraph path), location?, rotation?, scale?, blendMode? (max|min|override), priority?, smoothness?."
      schema:
        actorLabel: { type: string, required: true }
        source:     { type: string, required: true }
        location:   { type: object }
        rotation:   { type: object }
        scale:      { type: object }
        blendMode:  { type: string }
        priority:   { type: number }
        smoothness: { type: number }

    set_volume_graph_stamp:
      task: voxel.set_volume_graph_stamp
      description: "Build a volume-graph stamp from a UVoxelVolumeGraph (source) and apply it to a stamp actor. Wraps editor.execute_python -> VoxelVolumeGraphStamp.Make. Params: actorLabel, source (UVoxelVolumeGraph path), location?, rotation?, scale?, blendMode? (additive|subtractive|intersect|override), priority?, smoothness?."
      schema:
        actorLabel: { type: string, required: true }
        source:     { type: string, required: true }
        location:   { type: object }
        rotation:   { type: object }
        scale:      { type: object }
        blendMode:  { type: string }
        priority:   { type: number }
        smoothness: { type: number }

    set_mesh_stamp:
      task: voxel.set_mesh_stamp
      description: "Build a mesh stamp from a UVoxelStaticMesh (source) and apply it to a stamp actor (tricubic on). Wraps editor.execute_python -> VoxelMeshStamp.Make. Params: actorLabel, source (UVoxelStaticMesh path), location?, rotation?, scale?, blendMode? (additive|subtractive|intersect|override), priority?, smoothness?."
      schema:
        actorLabel: { type: string, required: true }
        source:     { type: string, required: true }
        location:   { type: object }
        rotation:   { type: object }
        scale:      { type: object }
        blendMode:  { type: string }
        priority:   { type: number }
        smoothness: { type: number }

    set_height_spline_stamp:
      task: voxel.set_height_spline_stamp
      description: "Build a height-spline stamp from a UVoxelHeightSplineGraph (source) and apply it to a stamp actor. Wraps editor.execute_python -> VoxelHeightSplineStamp.Make. Params: actorLabel, source (UVoxelHeightSplineGraph path), location?, rotation?, scale?, blendMode? (max|min|override), priority?, smoothness?."
      schema:
        actorLabel: { type: string, required: true }
        source:     { type: string, required: true }
        location:   { type: object }
        rotation:   { type: object }
        scale:      { type: object }
        blendMode:  { type: string }
        priority:   { type: number }
        smoothness: { type: number }

    set_volume_spline_stamp:
      task: voxel.set_volume_spline_stamp
      description: "Build a volume-spline stamp from a UVoxelVolumeSplineGraph (source) and apply it to a stamp actor. Wraps editor.execute_python -> VoxelVolumeSplineStamp.Make. Params: actorLabel, source (UVoxelVolumeSplineGraph path), location?, rotation?, scale?, blendMode? (additive|subtractive|intersect|override), priority?, smoothness?."
      schema:
        actorLabel: { type: string, required: true }
        source:     { type: string, required: true }
        location:   { type: object }
        rotation:   { type: object }
        scale:      { type: object }
        blendMode:  { type: string }
        priority:   { type: number }
        smoothness: { type: number }

    update_stamp_actor:
      task: voxel.update_stamp_actor
      description: "Call AVoxelStampActor::UpdateStamp() — re-apply the actor's stamp after its properties change. Wraps editor.invoke_function. Header: Voxel/Public/VoxelStampActor.h. Params: actorLabel, world? (editor|pie)."
      schema:
        actorLabel: { type: string, required: true }
        world: { type: string }

    volume_clear_sculpt_cache:
      task: voxel.volume_clear_sculpt_cache
      description: "Free the sculpt cache on an AVoxelVolumeSculptActor (not the data; see volume_clear_sculpt_data). Static lib on base VoxelVolumeSculptBlueprintLibrary. Wraps editor.execute_python. Params: actorLabel."
      schema:
        actorLabel: { type: string, required: true }

    height_clear_sculpt_cache:
      task: voxel.height_clear_sculpt_cache
      description: "Free the sculpt cache on an AVoxelHeightSculptActor (not the data; see height_clear_sculpt_data). Static lib on base VoxelHeightSculptBlueprintLibrary. Wraps editor.execute_python. Params: actorLabel."
      schema:
        actorLabel: { type: string, required: true }

    set_sculpt_save_asset:
      task: voxel.set_sculpt_save_asset
      description: "Link a sculpt actor (height or volume) to an external save asset so edits persist (height->UVoxelHeightSculptSaveAsset, volume->UVoxelVolumeSculptSaveAsset; type must match the actor). Wraps editor.execute_python -> SetExternalSaveAsset. Params: actorLabel, savePath (save asset object path)."
      schema:
        actorLabel: { type: string, required: true }
        savePath:   { type: string, required: true }

    get_sculpt_save_asset:
      task: voxel.get_sculpt_save_asset
      description: "Read the external save asset linked to a sculpt actor; returns its object path (or None) on a VOXEL_SAVE_ASSET= line. Wraps editor.execute_python -> GetExternalSaveAsset. Params: actorLabel."
      schema:
        actorLabel: { type: string, required: true }

    # ── World lifecycle / status (wrap editor.invoke_function) ────────────
    is_world_ready:
      task: voxel.is_world_ready
      description: "Read AVoxelWorld::IsVoxelWorldReady() — the single most useful gate before scattering / stamping / sampling. Wraps editor.invoke_function. Result at data.returnValues.ReturnValue as 'true'/'false'. Header: Voxel/Public/VoxelWorld.h. Params: actorLabel, world? (editor|pie)."
      schema:
        actorLabel: { type: string, required: true }
        world: { type: string }

    get_world_progress:
      task: voxel.get_world_progress
      description: "Read AVoxelWorld::GetProgress() — 0..1 while processing, 1 when idle. Wraps editor.invoke_function. Result at data.returnValues.ReturnValue (float string). Header: Voxel/Public/VoxelWorld.h. Params: actorLabel, world? (editor|pie)."
      schema:
        actorLabel: { type: string, required: true }
        world: { type: string }

    is_runtime_created:
      task: voxel.is_runtime_created
      description: "Read AVoxelWorld::IsRuntimeCreated() — runtime initialized (distinct from fully-rendered; see voxel_is_world_ready). Wraps editor.invoke_function. Result 'true'/'false' at data.returnValues.ReturnValue. Header: Voxel/Public/VoxelWorld.h. Params: actorLabel, world? (editor|pie)."
      schema:
        actorLabel: { type: string, required: true }
        world: { type: string }

    is_processing_new_state:
      task: voxel.is_processing_new_state
      description: "Read AVoxelWorld::IsProcessingNewState() — a regeneration is in flight. Wraps editor.invoke_function. Result 'true'/'false' at data.returnValues.ReturnValue. Header: Voxel/Public/VoxelWorld.h. Params: actorLabel, world? (editor|pie)."
      schema:
        actorLabel: { type: string, required: true }
        world: { type: string }

    get_num_pending_tasks:
      task: voxel.get_num_pending_tasks
      description: "Read AVoxelWorld::GetNumPendingTasks() — queued background task count; coarse 'work left' signal. Wraps editor.invoke_function. Result at data.returnValues.ReturnValue (int string). Header: Voxel/Public/VoxelWorld.h. Params: actorLabel, world? (editor|pie)."
      schema:
        actorLabel: { type: string, required: true }
        world: { type: string }

    create_runtime:
      task: voxel.create_runtime
      description: "Call AVoxelWorld::CreateRuntime() — explicitly initialize the voxel runtime (e.g. when bCreateRuntimeOnBeginPlay is off). No return value. Wraps editor.invoke_function. Header: Voxel/Public/VoxelWorld.h. Params: actorLabel, world? (editor|pie)."
      schema:
        actorLabel: { type: string, required: true }
        world: { type: string }

    destroy_runtime:
      task: voxel.destroy_runtime
      description: "Call AVoxelWorld::DestroyRuntime() — tear down the voxel runtime (frees meshes/collision/nav until re-created). No return value. Wraps editor.invoke_function. Header: Voxel/Public/VoxelWorld.h. Params: actorLabel, world? (editor|pie)."
      schema:
        actorLabel: { type: string, required: true }
        world: { type: string }

    # ── AVoxelWorld config (wrap level.set_actor_property) ────────────────
    set_world_layer_stack:
      task: voxel.set_world_layer_stack
      description: "Set AVoxelWorld::LayerStack — the UVoxelLayerStack asset defining what the world generates/renders (without it the world renders nothing). Wraps level.set_actor_property. Header: Voxel/Public/VoxelWorld.h. Params: actorLabel, value (asset object path, e.g. /Voxel/Default/DefaultStack.DefaultStack)."
      schema:
        actorLabel: { type: string, required: true }
        value: { type: string, required: true }

    set_world_mega_material:
      task: voxel.set_world_mega_material
      description: "Set AVoxelWorld::MegaMaterial — the UVoxelMegaMaterial asset driving surface shading. Wraps level.set_actor_property. Header: Voxel/Public/VoxelWorld.h. Params: actorLabel, value (asset object path)."
      schema:
        actorLabel: { type: string, required: true }
        value: { type: string, required: true }

    set_world_voxel_size:
      task: voxel.set_world_voxel_size
      description: "Set AVoxelWorld::VoxelSize — edge length of one voxel in cm (default 100; lower = finer + heavier). Wraps level.set_actor_property. Header: Voxel/Public/VoxelWorld.h. Params: actorLabel, value (integer cm)."
      schema:
        actorLabel: { type: string, required: true }
        value: { type: number, required: true }

    set_world_enable_nanite:
      task: voxel.set_world_enable_nanite
      description: "Set AVoxelWorld::bEnableNanite — Nanite rendering of voxel meshes (default true). Wraps level.set_actor_property. Header: Voxel/Public/VoxelWorld.h. Params: actorLabel, value (bool)."
      schema:
        actorLabel: { type: string, required: true }
        value: { type: boolean, required: true }

    set_world_enable_navigation:
      task: voxel.set_world_enable_navigation
      description: "Set AVoxelWorld::bEnableNavigation — navmesh over the voxel surface (default true; needed for AI pathfinding). Wraps level.set_actor_property. Header: Voxel/Public/VoxelWorld.h. Params: actorLabel, value (bool)."
      schema:
        actorLabel: { type: string, required: true }
        value: { type: boolean, required: true }

    set_world_enable_lumen:
      task: voxel.set_world_enable_lumen
      description: "Set AVoxelWorld::bEnableLumen — Lumen GI on voxel meshes (default false; expensive). Wraps level.set_actor_property. Header: Voxel/Public/VoxelWorld.h. Params: actorLabel, value (bool)."
      schema:
        actorLabel: { type: string, required: true }
        value: { type: boolean, required: true }

    # ── Volume sculpting (static VoxelVolumeSculptBlueprintLibrary; ──────────
    #    wrap editor.execute_python — no native static-library invoke exists).
    #    All target an AVoxelVolumeSculptActor by label; center is world-space.
    volume_sculpt_sphere:
      task: voxel.volume_sculpt_sphere
      description: "Add/remove a sphere on an AVoxelVolumeSculptActor. Wraps editor.execute_python -> VoxelVolumeSculptBlueprintLibrary::SculptSphere. Header: Voxel/Public/Sculpt/Volume/VoxelVolumeSculptBlueprintLibrary.h. Params: actorLabel, center ({x,y,z}), radius? (cm, def 1000), mode? (add|remove), smoothness? (def 0)."
      schema:
        actorLabel: { type: string, required: true }
        center: { type: object, required: true }
        radius: { type: number }
        mode: { type: string }
        smoothness: { type: number }

    volume_sculpt_cube:
      task: voxel.volume_sculpt_cube
      description: "Add/remove a rounded, rotated cube on an AVoxelVolumeSculptActor. Wraps editor.execute_python -> VoxelVolumeSculptBlueprintLibrary::SculptCube. Params: actorLabel, center ({x,y,z}), size? ({x,y,z}, def 1000^3), rotation? ({pitch,yaw,roll}), roundness? (def 0), mode? (add|remove), smoothness? (def 0)."
      schema:
        actorLabel: { type: string, required: true }
        center: { type: object, required: true }
        size: { type: object }
        rotation: { type: object }
        roundness: { type: number }
        mode: { type: string }
        smoothness: { type: number }

    volume_flatten:
      task: voxel.volume_flatten
      description: "Flatten a voxel surface along a normal on an AVoxelVolumeSculptActor. Wraps editor.execute_python -> VoxelVolumeSculptBlueprintLibrary::Flatten. Params: actorLabel, center ({x,y,z}), normal? ({x,y,z}, def (0,0,1)), radius? (def 500), height? (def 1000), falloff? (0..1, def 0.1), type? (additive|subtractive|both)."
      schema:
        actorLabel: { type: string, required: true }
        center: { type: object, required: true }
        normal: { type: object }
        radius: { type: number }
        height: { type: number }
        falloff: { type: number }
        type: { type: string }

    volume_smooth:
      task: voxel.volume_smooth
      description: "Smooth/blur a region on an AVoxelVolumeSculptActor. Wraps editor.execute_python -> VoxelVolumeSculptBlueprintLibrary::Smooth. Params: actorLabel, center ({x,y,z}), radius? (def 1000), strength? (def 1)."
      schema:
        actorLabel: { type: string, required: true }
        center: { type: object, required: true }
        radius: { type: number }
        strength: { type: number }

    volume_sculpt_surface:
      task: voxel.volume_sculpt_surface
      description: "Progressively sculpt a voxel surface on an AVoxelVolumeSculptActor. Wraps editor.execute_python -> VoxelVolumeSculptBlueprintLibrary::SculptSurface. Params: actorLabel, center ({x,y,z}), radius? (def 500), strength? (def 0.5), mode? (add|remove)."
      schema:
        actorLabel: { type: string, required: true }
        center: { type: object, required: true }
        radius: { type: number }
        strength: { type: number }
        mode: { type: string }

    volume_sculpt_angle:
      task: voxel.volume_sculpt_angle
      description: "Move a voxel surface toward a plane (sculpt angles) on an AVoxelVolumeSculptActor. Wraps editor.execute_python -> VoxelVolumeSculptBlueprintLibrary::SculptAngle. Params: actorLabel, center ({x,y,z}), radius? (def 500), strength? (def 1), planePoint? ({x,y,z}), planeNormal? ({x,y,z}, def (0,0,1)), mergeMode? (intersection|override|union)."
      schema:
        actorLabel: { type: string, required: true }
        center: { type: object, required: true }
        radius: { type: number }
        strength: { type: number }
        planePoint: { type: object }
        planeNormal: { type: object }
        mergeMode: { type: string }

    volume_paint_surface:
      task: voxel.volume_paint_surface
      description: "Paint a surface type on a sculpt stamp of an AVoxelVolumeSculptActor. Wraps editor.execute_python -> VoxelVolumeSculptBlueprintLibrary::PaintSurface. Params: actorLabel, center ({x,y,z}), radius? (def 500), strength? (def 0.05), mode? (add|remove), surfaceType? (object path to a UVoxelSurfaceTypeInterface asset)."
      schema:
        actorLabel: { type: string, required: true }
        center: { type: object, required: true }
        radius: { type: number }
        strength: { type: number }
        mode: { type: string }
        surfaceType: { type: string }

    volume_apply_sculpt_graph:
      task: voxel.volume_apply_sculpt_graph
      description: "Apply a volume sculpt graph at a location on an AVoxelVolumeSculptActor. Builds FVoxelVolumeSculptGraphWrapper from the graph asset. Wraps editor.execute_python -> VoxelVolumeSculptBlueprintLibrary::ApplySculptGraph. Params: actorLabel, center ({x,y,z}), graph (object path to a UVoxelVolumeSculptGraph), radius? (def 500), rotation? ({pitch,yaw,roll})."
      schema:
        actorLabel: { type: string, required: true }
        center:     { type: object, required: true }
        graph:      { type: string, required: true }
        radius:     { type: number }
        rotation:   { type: object }

    volume_clear_sculpt_data:
      task: voxel.volume_clear_sculpt_data
      description: "Clear all sculpt data on an AVoxelVolumeSculptActor (resets edits). Wraps editor.execute_python -> VoxelVolumeSculptBlueprintLibrary::ClearSculptData. Params: actorLabel."
      schema:
        actorLabel: { type: string, required: true }

    # ── Height sculpting (static VoxelHeightSculptBlueprintLibrary; ─────────
    #    wrap editor.execute_python). Target an AVoxelHeightSculptActor by
    #    label; center is 2D ({x,y}) world-space.
    height_sculpt_height:
      task: voxel.height_sculpt_height
      description: "Raise/lower height on an AVoxelHeightSculptActor. Wraps editor.execute_python -> VoxelHeightSculptBlueprintLibrary::SculptHeight. Header: Voxel/Public/Sculpt/Height/VoxelHeightSculptBlueprintLibrary.h. Params: actorLabel, center ({x,y}), radius? (def 500), strength? (def 0.5), mode? (add|remove)."
      schema:
        actorLabel: { type: string, required: true }
        center: { type: object, required: true }
        radius: { type: number }
        strength: { type: number }
        mode: { type: string }

    height_flatten:
      task: voxel.height_flatten
      description: "Flatten a height region toward a target height on an AVoxelHeightSculptActor. Wraps editor.execute_python -> VoxelHeightSculptBlueprintLibrary::Flatten. Params: actorLabel, center ({x,y}), radius? (def 500), falloff? (0..1, def 0.1), type? (additive|subtractive|both), targetHeight? (def 0)."
      schema:
        actorLabel: { type: string, required: true }
        center: { type: object, required: true }
        radius: { type: number }
        falloff: { type: number }
        type: { type: string }
        targetHeight: { type: number }

    height_smooth:
      task: voxel.height_smooth
      description: "Smooth/blur a height region on an AVoxelHeightSculptActor. Wraps editor.execute_python -> VoxelHeightSculptBlueprintLibrary::Smooth. Params: actorLabel, center ({x,y}), radius? (def 1000), strength? (def 1)."
      schema:
        actorLabel: { type: string, required: true }
        center: { type: object, required: true }
        radius: { type: number }
        strength: { type: number }

    height_paint_surface:
      task: voxel.height_paint_surface
      description: "Paint a surface type on a height sculpt stamp of an AVoxelHeightSculptActor. Wraps editor.execute_python -> VoxelHeightSculptBlueprintLibrary::PaintSurface. Params: actorLabel, center ({x,y}), radius? (def 500), strength? (def 0.05), mode? (add|remove), surfaceType? (object path to a UVoxelSurfaceTypeInterface asset)."
      schema:
        actorLabel: { type: string, required: true }
        center: { type: object, required: true }
        radius: { type: number }
        strength: { type: number }
        mode: { type: string }
        surfaceType: { type: string }

    height_apply_sculpt_graph:
      task: voxel.height_apply_sculpt_graph
      description: "Apply a height sculpt graph at a location on an AVoxelHeightSculptActor. Builds FVoxelHeightSculptGraphWrapper from the graph asset. Wraps editor.execute_python -> VoxelHeightSculptBlueprintLibrary::ApplySculptGraph. Params: actorLabel, center ({x,y}), graph (object path to a UVoxelHeightSculptGraph), radius? (def 500)."
      schema:
        actorLabel: { type: string, required: true }
        center:     { type: object, required: true }
        graph:      { type: string, required: true }
        radius:     { type: number }

    height_clear_sculpt_data:
      task: voxel.height_clear_sculpt_data
      description: "Clear all sculpt data on an AVoxelHeightSculptActor (resets edits). Wraps editor.execute_python -> VoxelHeightSculptBlueprintLibrary::ClearSculptData. Params: actorLabel."
      schema:
        actorLabel: { type: string, required: true }

    # ── Query / sampling (static VoxelQueryBlueprintLibrary) ──────────────
    query_voxel_layer:
      task: voxel.query_voxel_layer
      description: "Sample one point of a voxel layer; returns FVoxelQueryResult (value, surface_type, normal) as JSON on a VOXEL_QUERY_RESULT= line (value/normal are null where the layer has no surface there). Static lib taking an FVoxelStackLayer -> wraps editor.execute_python (resolves the layer from the stack asset, queries the editor world). Header: Voxel/Public/VoxelQueryBlueprintLibrary.h. Params: position ({x,y,z}), stack? (asset path, default DefaultStack), layerType? (height|volume, default volume), layerIndex? (default 0), gradientStep? (default 100)."
      schema:
        position:     { type: object, required: true }
        stack:        { type: string }
        layerType:    { type: string }
        layerIndex:   { type: number }
        gradientStep: { type: number }

    multi_query_voxel_layer:
      task: voxel.multi_query_voxel_layer
      description: "Batch-sample many points of a voxel layer in one call; returns an array of FVoxelQueryResult (value, surface_type, normal) as JSON on a VOXEL_QUERY_RESULT= line. Static lib taking an FVoxelStackLayer + positions -> wraps editor.execute_python. Header: Voxel/Public/VoxelQueryBlueprintLibrary.h. Params: positions ([{x,y,z}]), stack? (default DefaultStack), layerType? (height|volume, default volume), layerIndex? (default 0), gradientStep? (default 100)."
      schema:
        positions:    { type: array, required: true }
        stack:        { type: string }
        layerType:    { type: string }
        layerIndex:   { type: number }
        gradientStep: { type: number }

    export_voxel_data_to_render_target:
      task: voxel.export_voxel_data_to_render_target
      description: "Query a voxel height layer over a 2D zone and write it into a UTextureRenderTarget2D (RGB=value, A=1); returns success on a VOXEL_EXPORT_OK= line. Static lib building an FVoxelColorQuery from QueryHeight/MakeConstant -> wraps editor.execute_python. Header: Voxel/Public/VoxelQueryBlueprintLibrary.h. Params: renderTarget (UTextureRenderTarget2D object path), min ({x,y}), max ({x,y}), stack? (default DefaultStack), layerIndex? (default 0), query? (height|constant, default height), constant? (when query=constant)."
      schema:
        renderTarget: { type: string, required: true }
        min:          { type: object, required: true }
        max:          { type: object, required: true }
        stack:        { type: string }
        layerIndex:   { type: number }
        query:        { type: string }
        constant:     { type: number }

